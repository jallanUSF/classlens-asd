services:
  - type: web
    name: classlens-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: GOOGLE_AI_STUDIO_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: MODEL_PROVIDER
        value: google
