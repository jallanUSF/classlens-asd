[theme]
primaryColor = "#5B8FB9"
backgroundColor = "#FAFAFA"
secondaryBackgroundColor = "#F0F4F8"
textColor = "#2C3E50"
font = "sans serif"

[client]
# Security: Disable detailed error messages in production
showErrorDetails = false

[logger]
# Security: Log errors only, not debug info
level = "error"

[server]
# Security: Cross-site request forgery protection
enableXsrfProtection = true
# File upload limits (prevent DOS attacks)
maxUploadSize = 10  # 10 MB max per file

[browser]
# Security: Disable developer console in production
gatherUsageStats = false
